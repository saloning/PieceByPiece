<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1>Hi! I’m Saloni</h1>
    <p class="subtitle">click on a puzzle piece to learn more about me! ♡</p>

    <section class="puzzle-area">
      <div id="puzzleBoard" class="puzzle-board"></div>
      <div id="piecesContainer" class="pieces-container"></div>

      <div id="factPanel" class="fact-panel hidden">
        <img id="factImage" src="" alt="Fact image" />
        <p id="factText"></p>
        <button id="placePieceBtn">Place Piece</button>
      </div>
    </section>

    <button id="resetBtn">Reset Puzzle</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
